<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Godot Mobile Course</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        
        <!-- Контейнер авторизации/регистрации -->
        <div v-if="!currentStudent" class="bg-white p-8 pixel-border max-w-md w-full text-black">
            
            <!-- ФОРМА ВХОДА -->
            <div v-if="authMode === 'login'">
                <h2 class="pixel-font text-sm mb-6 text-blue-600 text-center">ВХОД В ПОРТ</h2>
                <input v-model="loginForm.nickname" class="input-field" placeholder="Никнейм">
                <input v-model="loginForm.studentId" class="input-field" placeholder="№ Зачетки">
                <button @click="handleLogin" class="btn-primary w-full pixel-font text-[10px]">ВОЙТИ</button>
                <p class="mt-4 text-center">Нет аккаунта? <span @click="authMode = 'register'" class="link-action">Зарегистрироваться</span></p>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div v-if="authMode === 'register'">
                <h2 class="pixel-font text-sm mb-6 text-orange-500 text-center">НОВЫЙ ПИРАТ</h2>
                <input v-model="regForm.nickname" class="input-field" placeholder="Никнейм">
                <input v-model="regForm.fullName" class="input-field" placeholder="ФИО">
                <input v-model="regForm.group" class="input-field" placeholder="Группа (напр. МД-21)">
                <input v-model="regForm.studentId" class="input-field" placeholder="№ Зачетки">
                <button @click="handleRegister" class="btn-primary w-full pixel-font text-[10px]">НАЧАТЬ ПУТЬ</button>
                <p class="mt-4 text-center">Уже есть аккаунт? <span @click="authMode = 'login'" class="link-action">Войти</span></p>
            </div>

        </div>

        <!-- КАРТА (показывается после входа) -->
        <div v-else class="w-full h-full text-center">
            <header class="p-4 bg-black bg-opacity-30 flex justify-between items-center">
                <span class="pixel-font text-xs">Капитан: {{ currentStudent.nickname }}</span>
                <button @click="logout" class="text-xs underline text-orange-400">Сменить аккаунт</button>
            </header>
            <div class="mt-20">
                <h1 class="pixel-font text-2xl">КАРТА ОСТРОВОВ</h1>
                <p class="mt-4 text-orange-200">Тут скоро появятся твои приключения...</p>
            </div>
        </div>

    </div>

    <!-- Подключаем основной скрипт как модуль -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
